name: Deploy Documentation

# Runs on every push to main, or manually from the Actions tab.
on:
  push:
    branches:
      - main
  workflow_dispatch:

# Grant write access so the workflow can push to the gh-pages branch.
permissions:
  contents: write

jobs:
  deploy-docs:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Source checkout ───────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Javadoc generation ────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate Javadoc
        run: |
          mkdir -p javadoc-out
          javadoc \
            -sourcepath src/main/java \
            -d javadoc-out \
            -subpackages algorithm:config:domain:intelligence:movement:simulation:ui:scenarios:algorithmTest \
            -windowtitle "UAV/WSN Simulator API" \
            -doctitle "<h1>UAV/WSN Simulator — API Reference</h1>" \
            -header "UAV/WSN Simulator" \
            -encoding UTF-8 \
            -charset UTF-8 \
            -Xdoclint:none \
            -quiet

      # ── 3. MkDocs site build ─────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install MkDocs Material
        run: pip install mkdocs-material

      # README.md lives at the repo root; MkDocs expects its home page at
      # docs/index.md. Copy it here so GitHub and the docs site stay in sync.
      - name: Prepare docs index
        run: cp README.md docs/index.md

      - name: Build MkDocs site
        run: mkdocs build
        # Output goes to site/

      # ── 4. Merge Javadoc into the built site ─────────────────────────────────
      # Place Javadoc at site/javadoc/ so the "Open API Reference" button in
      # docs/api.md resolves correctly at <base-url>/javadoc/index.html.
      - name: Add Javadoc to site
        run: cp -r javadoc-out site/javadoc

      # ── 5. Deploy to GitHub Pages ─────────────────────────────────────────────
      # Pushes site/ to the gh-pages branch. GitHub Pages serves from that branch.
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          # Keep previous deployments clean
          force_orphan: true
