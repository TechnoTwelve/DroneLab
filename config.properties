# ==============================================================================
# UAV/WSN Simulation - Application Configuration
# ==============================================================================
#
# Edit this file to change simulation parameters or swap strategies.
# No recompilation needed - just save and rerun.
#
# Algorithm-specific parameters (GA population size, ACO evaporation rate, etc.)
# live in their own Java config class (e.g. GaAcoConfig). Only simulation
# environment parameters belong here.


# -- Run settings --------------------------------------------------------------

# headless : true  = text-only output (no GUI window). Good for batch runs.
#            false = Swing GUI showing passes side-by-side in real time.
run.headless=false

# seed     : fixed long integer for reproducible runs (e.g. seed=17).
#            Leave blank (or omit) to use a fresh random seed each time.
run.seed=

# intelligences : comma-separated list of registered strategy keys.
#
#   Built-in keys:
#     patrol  = fixed four-corner perimeter patrol (baseline)
#     gaaco   = GA->ACO adaptive path planner
#
#   Adding your own:
#     1. Implement UAVIntelligence (or extend an existing class).
#     2. Register it in AppConfig.REGISTRY (one line):
#          REGISTRY.put("mykey", sim -> new MyIntelligence(sim));
#     3. Add the key below (e.g. run.intelligences=patrol,gaaco,mykey).
#
run.intelligences=patrol,gaaco


# -- Simulation environment ----------------------------------------------------

# Field size in simulation cells.
simulation.fieldWidth=1500
simulation.fieldHeight=1500

# Number of sensor nodes deployed at the start of each pass.
simulation.nodeCount=50

# First node ID (nodes are numbered nodeIdStart to nodeIdStart+nodeCount-1).
simulation.nodeIdStart=5000

# Transmission range of each sensor node (cells).
simulation.nodeRange=100

# Node movement speed: random value in [nodeMinSpeed, nodeMaxSpeed] cells/tick.
simulation.nodeMinSpeed=1
simulation.nodeMaxSpeed=1

# UAV scan radius (cells). Nodes within this distance are added to the KB.
# Sweep-optimised at 140: best win-rate over 20 seeds in a parameter sweep.
simulation.droneRange=140

# Initial UAV position (both X and Y). Also sets the four patrol corners.
# Patrol corners: (dp,dp), (dp,F-dp), (F-dp,F-dp), (F-dp,dp).
simulation.dronePlacement=72

# UAV movement speed (cells/tick).
simulation.droneSpeed=1

# Simulation duration in ticks.
# Default = 4*(1500 - 2*72) + 10 = one full patrol lap + 10 ticks.
simulation.duration=5434
